<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biologic Pack Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #fafafa;
    color: #222;
    font-size: 15px;
    line-height: 1.5;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; font-weight: 600; }
  .sub { color: #888; font-size: 13px; margin-bottom: 32px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin: 32px 0 12px; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; background: white; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .row select, .row input { border: none; background: transparent; font-size: 14px; padding: 4px 6px; color: #222; min-width: 0; }
  .row select:focus, .row input:focus { outline: none; background: #f4f4f4; border-radius: 4px; }
  .row .drug { flex: 1.5; }
  .row .indication { flex: 1.5; }
  .row .month { flex: 1; }
  .row .count { width: 60px; text-align: center; }
  .row .x { background: none; border: none; color: #c00; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .row .x:hover { color: #800; }
  .add { background: white; border: 1px dashed #bbb; color: #666; padding: 10px 14px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 13px; }
  .add:hover { border-color: #888; color: #222; }
  .result { background: #222; color: white; border-radius: 10px; padding: 24px; margin-top: 40px; text-align: center; }
  .result .big { font-size: 48px; font-weight: 700; line-height: 1; }
  .result .lbl { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-top: 6px; }
  .split { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #444; }
  .split div { text-align: center; }
  .split .v { font-size: 18px; font-weight: 600; }
  .split .l { font-size: 10px; color: #999; text-transform: uppercase; }
  details { margin-top: 20px; background: white; border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px 16px; }
  details summary { cursor: pointer; font-size: 13px; color: #555; font-weight: 500; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.num { text-align: right; }
  .switch-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
  .switch-box .top { display: grid; grid-template-columns: 1fr 110px 110px 110px; gap: 8px; align-items: end; margin-bottom: 12px; }
  .switch-box label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; font-weight: 600; }
  .switch-box input, .switch-box select { width: 100%; padding: 6px 8px; border: 1px solid #e5e5e5; border-radius: 5px; font-size: 13px; background: white; }
  .alloc { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding-top: 10px; border-top: 1px dashed #ddd; }
  .alloc .item { text-align: center; }
  .alloc .item input { text-align: center; }
  .alloc .item .out { font-size: 13px; color: #1c8a4a; font-weight: 600; margin-top: 4px; }
  .info { font-size: 12px; color: #888; margin-top: 8px; }
  .info b { color: #c00; }
  .export { margin-top: 16px; background: #0a6bbd; color: white; border: none; padding: 12px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; width: 100%; cursor: pointer; }
  .export:hover { background: #084e8a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Biologic Pack Calculator</h1>
  <div class="sub">Forecast annual biologic pack requirements with switch modelling.</div>

  <h2>New Patients</h2>
  <div id="new"></div>
  <button class="add" data-add="new">+ Add patient</button>

  <h2>Carryover Patients</h2>
  <div id="carry"></div>
  <button class="add" data-add="carry">+ Add carryover</button>

  <h2>Dose Reduction</h2>
  <div id="red"></div>
  <button class="add" data-add="red">+ Add reduced-dose group</button>

  <h2>Humira (Adalimumab) Dropout → Switch</h2>
  <div id="hum"></div>
  <button class="add" data-add="hum">+ Add Humira cohort</button>

  <div class="result">
    <div class="big" id="total">0</div>
    <div class="lbl">Total Packs to Order</div>
    <div class="split">
      <div><div class="v" id="tNew">0</div><div class="l">New</div></div>
      <div><div class="v" id="tCarry">0</div><div class="l">Carryover</div></div>
      <div><div class="v" id="tRed">0</div><div class="l">Reduced</div></div>
      <div><div class="v" id="tSwitch">0</div><div class="l">Switch (Humira)</div></div>
    </div>
  </div>

  <button class="export" id="exportPdf">⬇ Download PDF Report</button>

  <details>
    <summary>Breakdown by drug</summary>
    <table id="breakdown">
      <thead><tr><th>Drug</th><th class="num">New</th><th class="num">Carry</th><th class="num">Red</th><th class="num">Switch</th><th class="num">Total</th></tr></thead>
      <tbody></tbody>
    </table>
  </details>
</div>

<script>
const DRUGS = {
  tremfya: { name: "Tremfya", indications: {
    psoriasis: { label: "Psoriasis (Derm)",  induction: [0,4],   maint: 8,  packs: 1 },
    psa:       { label: "PsA (Rheum)",       induction: [0,4],   maint: 8,  packs: 1 },
    uc:        { label: "UC (GI)",           induction: [0,4,8], maint: 8,  packs: 2 },
    cd:        { label: "Crohn's (GI)",      induction: [0,4,8], maint: 8,  packs: 2 }
  }},
  remicade: { name: "Remicade", indications: {
    ra:        { label: "RA (Rheum) — 3 mg/kg q8w",         induction: [0,2,6], maint: 8, packs: 3 },
    ra_esc:    { label: "RA — escalated 10 mg/kg q8w",      induction: [0,2,6], maint: 8, packs: 7 },
    as:        { label: "AS (Rheum) — 5 mg/kg q6w",         induction: [0,2,6], maint: 6, packs: 4 },
    as_esc:    { label: "AS — escalated 10 mg/kg q8w",      induction: [0,2,6], maint: 8, packs: 7 },
    psa:       { label: "PsA (Rheum)",                       induction: [0,2,6], maint: 8, packs: 3 },
    psoriasis: { label: "Psoriasis (Derm)",                  induction: [0,2,6], maint: 8, packs: 3 },
    cd:        { label: "Crohn's (GI) — 5 mg/kg q8w",        induction: [0,2,6], maint: 8, packs: 4 },
    cd_esc:    { label: "Crohn's — escalated 10 mg/kg q8w",  induction: [0,2,6], maint: 8, packs: 7 },
    uc:        { label: "UC (GI)",                            induction: [0,2,6], maint: 8, packs: 3 }
  }},
  simponi: { name: "Simponi", indications: {
    ra:        { label: "RA (Rheum)",        induction: [],      maint: 4,  packs: 1 },
    psa:       { label: "PsA (Rheum)",       induction: [],      maint: 4,  packs: 1 },
    as:        { label: "AS (Rheum)",        induction: [],      maint: 4,  packs: 1 },
    uc:        { label: "UC (GI)",           induction: [0,2],   maint: 4,  packs: 2, indPacks: [4,2] }
  }},
  stelara: { name: "Stelara", indications: {
    psoriasis: { label: "Psoriasis (Derm)",  induction: [0,4],   maint: 12, packs: 1 },
    psa:       { label: "PsA (Rheum)",       induction: [0,4],   maint: 12, packs: 1 },
    cd:        { label: "Crohn's (GI)",      induction: [0,8],   maint: 8,  packs: 1 },
    uc:        { label: "UC (GI)",           induction: [0,8],   maint: 8,  packs: 1 }
  }}
};

const HUMIRA = { name: "Humira (adalimumab)", maint: 2, packs: 1 };
const SWITCH_TARGETS = ["tremfya", "stelara", "simponi"];

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MULTIPLIERS = [["1.25","×1.25"],["1.5","×1.5"],["2","×2"],["3","×3"]];

let lists = { new: [], carry: [], red: [], hum: [] };
let nextId = 1;

function drugOpts() {
  return Object.entries(DRUGS).map(([k,v]) => `<option value="${k}">${v.name}</option>`).join("");
}
function indOpts(d) {
  return Object.entries(DRUGS[d].indications).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join("");
}
function monthOpts() {
  return MONTHS.map((m,i) => `<option value="${i+1}">${m}</option>`).join("");
}

function packsForPatient(drugKey, indicationKey, startMonth) {
  const ind = DRUGS[drugKey].indications[indicationKey];
  if (!ind) return 0;
  const sw = (startMonth - 1) * 4.345;
  let packs = 0;
  ind.induction.forEach((wk, i) => {
    if (sw + wk < 52) packs += ind.indPacks ? ind.indPacks[i] : ind.packs;
  });
  const lastInd = ind.induction.length ? ind.induction[ind.induction.length-1] : 0;
  let nextWk = ind.induction.length ? lastInd + ind.maint : 0;
  while (sw + nextWk < 52) { packs += ind.packs; nextWk += ind.maint; }
  return packs;
}

function calcNew(p)   { return packsForPatient(p.drug, p.indication, p.month) * p.count; }
function calcCarry(c) {
  const ind = DRUGS[c.drug].indications[c.indication];
  return ind ? Math.floor(52 / ind.maint) * ind.packs * c.count : 0;
}
function calcRed(r) {
  const ind = DRUGS[r.drug].indications[r.indication];
  return ind ? Math.floor(52 / (ind.maint * r.mult)) * ind.packs * r.count : 0;
}

function calcHumira(h) {
  const dropouts = Math.round(h.total * (h.dropout / 100));
  const sumPct = h.allocTremfya + h.allocStelara + h.allocSimponi;
  if (sumPct === 0) return { dropouts, switches: [] };
  const switches = SWITCH_TARGETS.map(target => {
    const pct = target === "tremfya" ? h.allocTremfya
              : target === "stelara" ? h.allocStelara
              : h.allocSimponi;
    const patients = Math.round(dropouts * (pct / sumPct));
    const packs = packsForPatient(target, h.indication, h.month) * patients;
    return { drug: target, patients, packs };
  });
  return { dropouts, switches };
}

function rowHtml(type, item) {
  const extras = type === "new"
    ? `<select class="month" data-f="month">${monthOpts()}</select>`
    : type === "red"
      ? `<select class="month" data-f="mult">${MULTIPLIERS.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join("")}</select>`
      : "";
  return `<div class="row" data-id="${item.id}">
    <select class="drug" data-f="drug">${drugOpts()}</select>
    <select class="indication" data-f="indication">${indOpts(item.drug)}</select>
    ${extras}
    <input class="count" type="number" min="1" data-f="count" value="${item.count}" />
    <button class="x" data-rm>×</button>
  </div>`;
}

function humiraHtml(h) {
  const indSelectOpts = `
    <option value="ra">RA (Rheum)</option>
    <option value="psa">PsA (Rheum)</option>
    <option value="as">AS (Rheum)</option>
    <option value="psoriasis">Psoriasis (Derm)</option>
    <option value="cd">Crohn's (GI)</option>
    <option value="uc">UC (GI)</option>
  `;
  const calc = calcHumira(h);
  const byTarget = Object.fromEntries(calc.switches.map(s => [s.drug, s]));
  return `<div class="switch-box" data-id="${h.id}">
    <div class="top">
      <div><label>Humira Indication</label><select data-f="indication">${indSelectOpts}</select></div>
      <div><label>Patients (Y1)</label><input type="number" min="0" data-f="total" value="${h.total}" /></div>
      <div><label>Dropout %</label><input type="number" min="0" max="100" data-f="dropout" value="${h.dropout}" /></div>
      <div><label>Switch Month</label><select data-f="month">${monthOpts()}</select></div>
    </div>
    <div class="alloc">
      <div class="item"><label>→ Tremfya %</label><input type="number" min="0" max="100" data-f="allocTremfya" value="${h.allocTremfya}" /><div class="out">${byTarget.tremfya ? byTarget.tremfya.patients : 0} pts / ${byTarget.tremfya ? byTarget.tremfya.packs : 0} packs</div></div>
      <div class="item"><label>→ Stelara %</label><input type="number" min="0" max="100" data-f="allocStelara" value="${h.allocStelara}" /><div class="out">${byTarget.stelara ? byTarget.stelara.patients : 0} pts / ${byTarget.stelara ? byTarget.stelara.packs : 0} packs</div></div>
      <div class="item"><label>→ Simponi %</label><input type="number" min="0" max="100" data-f="allocSimponi" value="${h.allocSimponi}" /><div class="out">${byTarget.simponi ? byTarget.simponi.patients : 0} pts / ${byTarget.simponi ? byTarget.simponi.packs : 0} packs</div></div>
    </div>
    <div class="info">
      <b>${calc.dropouts}</b> dropouts of ${h.total} Humira patients (${h.dropout}%) re-distributed across selected biologics.
      <button class="x" data-rm style="float:right">×</button>
    </div>
  </div>`;
}

function render() {
  ["new","carry","red"].forEach(type => {
    const el = document.getElementById(type);
    el.innerHTML = lists[type].map(i => rowHtml(type, i)).join("");
    lists[type].forEach(item => {
      const row = el.querySelector(`[data-id="${item.id}"]`);
      row.querySelector('[data-f="drug"]').value = item.drug;
      row.querySelector('[data-f="indication"]').value = item.indication;
      if (type === "new") row.querySelector('[data-f="month"]').value = item.month;
      if (type === "red") row.querySelector('[data-f="mult"]').value = item.mult;
    });
  });

  const humEl = document.getElementById("hum");
  humEl.innerHTML = lists.hum.map(humiraHtml).join("");
  lists.hum.forEach(h => {
    const box = humEl.querySelector(`[data-id="${h.id}"]`);
    box.querySelector('[data-f="indication"]').value = h.indication;
    box.querySelector('[data-f="month"]').value = h.month;
  });

  const agg = {}; Object.keys(DRUGS).forEach(d => agg[d] = {n:0,c:0,r:0,s:0});
  let tN=0, tC=0, tR=0, tS=0;
  lists.new.forEach(p => { const v=calcNew(p); agg[p.drug].n+=v; tN+=v; });
  lists.carry.forEach(c => { const v=calcCarry(c); agg[c.drug].c+=v; tC+=v; });
  lists.red.forEach(r => { const v=calcRed(r); agg[r.drug].r+=v; tR+=v; });
  lists.hum.forEach(h => {
    calcHumira(h).switches.forEach(s => { agg[s.drug].s += s.packs; tS += s.packs; });
  });

  document.getElementById("tNew").textContent = tN;
  document.getElementById("tCarry").textContent = tC;
  document.getElementById("tRed").textContent = tR;
  document.getElementById("tSwitch").textContent = tS;
  document.getElementById("total").textContent = tN + tC + tR + tS;

  document.querySelector("#breakdown tbody").innerHTML = Object.entries(agg).map(([k,v]) =>
    `<tr><td>${DRUGS[k].name}</td><td class="num">${v.n}</td><td class="num">${v.c}</td><td class="num">${v.r}</td><td class="num">${v.s}</td><td class="num"><strong>${v.n+v.c+v.r+v.s}</strong></td></tr>`
  ).join("");
}

function addItem(type) {
  if (type === "hum") {
    lists.hum.push({ id: nextId++, indication: "ra", total: 20, dropout: 50, month: 1, allocTremfya: 40, allocStelara: 40, allocSimponi: 20 });
  } else {
    const base = { id: nextId++, drug: "tremfya", indication: "psoriasis", count: 1 };
    if (type === "new") base.month = new Date().getMonth() + 1;
    if (type === "red") base.mult = 1.5;
    if (type === "carry") base.count = 5;
    lists[type].push(base);
  }
  render();
}

document.querySelectorAll("[data-add]").forEach(btn => {
  btn.addEventListener("click", () => addItem(btn.dataset.add));
});

document.body.addEventListener("change", e => {
  const row = e.target.closest("[data-id]");
  if (!row) return;
  const parentId = row.parentElement.id;
  const type = parentId === "hum" ? "hum" : parentId;
  const item = lists[type].find(x => x.id === +row.dataset.id);
  if (!item) return;
  const f = e.target.dataset.f;
  let v = e.target.value;
  const numeric = ["month","count","mult","total","dropout","allocTremfya","allocStelara","allocSimponi"];
  if (numeric.includes(f)) v = +v;
  item[f] = v;
  if (f === "drug" && type !== "hum") item.indication = Object.keys(DRUGS[v].indications)[0];
  render();
});

document.body.addEventListener("click", e => {
  if (!e.target.hasAttribute("data-rm")) return;
  const row = e.target.closest("[data-id]");
  const parentId = row.parentElement.id;
  const type = parentId === "hum" ? "hum" : parentId;
  lists[type] = lists[type].filter(x => x.id !== +row.dataset.id);
  render();
});

addItem("new");

function buildReportData() {
  const agg = {};
  Object.keys(DRUGS).forEach(d => agg[d] = { newPts: 0, carryPts: 0, redPts: 0, switchPts: 0, newPk: 0, carryPk: 0, redPk: 0, switchPk: 0 });
  const flow = MONTHS.map(() => ({ new: 0, switch: 0 }));

  lists.new.forEach(p => { agg[p.drug].newPts += p.count; agg[p.drug].newPk += calcNew(p); flow[p.month - 1].new += p.count; });
  lists.carry.forEach(c => { agg[c.drug].carryPts += c.count; agg[c.drug].carryPk += calcCarry(c); });
  lists.red.forEach(r => { agg[r.drug].redPts += r.count; agg[r.drug].redPk += calcRed(r); });
  lists.hum.forEach(h => {
    calcHumira(h).switches.forEach(s => { agg[s.drug].switchPts += s.patients; agg[s.drug].switchPk += s.packs; flow[h.month - 1].switch += s.patients; });
  });

  return { agg, flow };
}

document.getElementById("exportPdf").addEventListener("click", () => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const today = new Date().toISOString().slice(0, 10);
  const { agg, flow } = buildReportData();

  doc.setFontSize(18).setFont(undefined, "bold");
  doc.text("Biologic Pack Calculator — Annual Report", 40, 50);
  doc.setFontSize(10).setFont(undefined, "normal").setTextColor(100);
  doc.text(`Generated ${today}`, 40, 68);
  doc.setTextColor(0);

  let totPts = 0, totPk = 0, totRedPts = 0;
  Object.values(agg).forEach(v => {
    totPts += v.newPts + v.carryPts + v.switchPts;
    totPk  += v.newPk + v.carryPk + v.redPk + v.switchPk;
    totRedPts += v.redPts;
  });

  doc.setFontSize(12).setFont(undefined, "bold");
  doc.text("Year-End Totals", 40, 100);
  doc.autoTable({
    startY: 108,
    head: [["Metric", "Value"]],
    body: [
      ["New patients",            Object.values(agg).reduce((s,v) => s+v.newPts, 0)],
      ["Carryover patients",      Object.values(agg).reduce((s,v) => s+v.carryPts, 0)],
      ["Dose-reduced patients",   totRedPts],
      ["Switch patients (Humira)", Object.values(agg).reduce((s,v) => s+v.switchPts, 0)],
      [{ content: "Total patients on therapy", styles: { fontStyle: "bold" } },
       { content: totPts, styles: { fontStyle: "bold" } }],
      [{ content: "Total packs to order",      styles: { fontStyle: "bold", textColor: [200,16,46] } },
       { content: totPk,  styles: { fontStyle: "bold", textColor: [200,16,46] } }]
    ],
    theme: "grid", styles: { fontSize: 10 }, headStyles: { fillColor: [34,34,34] }
  });

  doc.setFont(undefined, "bold").setFontSize(12);
  doc.text("Breakdown by Drug", 40, doc.lastAutoTable.finalY + 28);
  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 36,
    head: [["Drug", "New pts", "Carry pts", "Red pts", "Switch pts", "Total pts", "Total packs"]],
    body: Object.entries(agg).map(([k, v]) => [
      DRUGS[k].name, v.newPts, v.carryPts, v.redPts, v.switchPts,
      v.newPts + v.carryPts + v.redPts + v.switchPts,
      v.newPk + v.carryPk + v.redPk + v.switchPk
    ]),
    theme: "striped", styles: { fontSize: 10, halign: "right" },
    columnStyles: { 0: { halign: "left", fontStyle: "bold" } },
    headStyles: { fillColor: [10,107,189] }
  });

  doc.setFont(undefined, "bold").setFontSize(12);
  doc.text("Recruitment Flow (patients onboarded by month)", 40, doc.lastAutoTable.finalY + 28);
  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 36,
    head: [["Month", "New patients", "Switched from Humira", "Total onboarded"]],
    body: MONTHS.map((m, i) => [m, flow[i].new, flow[i].switch, flow[i].new + flow[i].switch]),
    foot: [["Total",
      flow.reduce((s,f) => s+f.new, 0),
      flow.reduce((s,f) => s+f.switch, 0),
      flow.reduce((s,f) => s+f.new+f.switch, 0)
    ]],
    theme: "striped", styles: { fontSize: 10, halign: "right" },
    columnStyles: { 0: { halign: "left", fontStyle: "bold" } },
    headStyles: { fillColor: [28,138,74] },
    footStyles: { fillColor: [240,240,240], textColor: 0, fontStyle: "bold" }
  });

  if (lists.new.length) {
    doc.setFont(undefined, "bold").setFontSize(12);
    doc.text("New-Patient Detail", 40, doc.lastAutoTable.finalY + 28);
    doc.autoTable({
      startY: doc.lastAutoTable.finalY + 36,
      head: [["#", "Drug", "Indication", "Start", "Patients", "Packs"]],
      body: lists.new.map((p, i) => {
        const ind = DRUGS[p.drug].indications[p.indication];
        return [i+1, DRUGS[p.drug].name, ind ? ind.label : "?", MONTHS[p.month-1], p.count, calcNew(p)];
      }),
      theme: "grid", styles: { fontSize: 9 }, headStyles: { fillColor: [100,100,100] }
    });
  }

  const pageH = doc.internal.pageSize.height;
  doc.setFontSize(8).setTextColor(120);
  doc.text("Decision-support output. Dosing schedules are simplified reference values for forecasting only — verify against current product SmPC before clinical use.", 40, pageH - 30, { maxWidth: 515 });

  doc.save(`biologic-pack-report-${today}.pdf`);
});
</script>
</body>
</html>
