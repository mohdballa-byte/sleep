<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sleep Tracker</title>
<style>
  :root {
    --bg: #0e1230;
    --card: #1a1f4a;
    --accent: #7b8cff;
    --text: #e8ecff;
    --muted: #a0a8d4;
    --healthy: #4ade80;
    --moderate: #facc15;
    --concerning: #fb923c;
    --dangerous: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #0e1230 0%, #1a1f4a 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 560px; margin: 0 auto; }
  h1 { margin: 0 0 .25rem; font-size: 1.8rem; }
  .subtitle { color: var(--muted); margin-bottom: 1.75rem; }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.25);
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    margin-bottom: .35rem;
    font-size: .9rem;
    color: var(--muted);
  }
  .field { margin-bottom: 1rem; }
  input[type="number"] {
    width: 100%;
    padding: .65rem .8rem;
    border-radius: 8px;
    border: 1px solid #2d345f;
    background: #0e1230;
    color: var(--text);
    font-size: 1rem;
  }
  input[type="number"]:focus { outline: 2px solid var(--accent); }
  button {
    width: 100%;
    padding: .8rem;
    background: var(--accent);
    color: #0e1230;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  .result { display: none; }
  .result.show { display: block; }
  .status {
    text-align: center;
    padding: 1rem;
    border-radius: 10px;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }
  .status.healthy    { background: rgba(74,222,128,.15); color: var(--healthy); }
  .status.moderate   { background: rgba(250,204,21,.15);  color: var(--moderate); }
  .status.concerning { background: rgba(251,146,60,.15);  color: var(--concerning); }
  .status.dangerous  { background: rgba(239,68,68,.15);   color: var(--dangerous); }
  .breakdown { display: grid; gap: .5rem; }
  .row {
    display: flex;
    justify-content: space-between;
    padding: .5rem .75rem;
    background: rgba(255,255,255,.04);
    border-radius: 6px;
    font-size: .92rem;
  }
  .row span:last-child { color: var(--muted); }
  .notes {
    margin-top: 1rem;
    padding: .85rem;
    background: rgba(255,255,255,.04);
    border-radius: 8px;
    font-size: .88rem;
    line-height: 1.5;
    color: var(--muted);
  }
  .notes ul { margin: .4rem 0 0; padding-left: 1.2rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Sleep Tracker</h1>
  <p class="subtitle">Log last night's sleep stages to assess your sleep health.</p>

  <form class="card" id="sleepForm">
    <div class="field">
      <label for="deep">Deep sleep (minutes)</label>
      <input type="number" id="deep" min="0" step="1" required />
    </div>
    <div class="field">
      <label for="light">Light sleep (minutes)</label>
      <input type="number" id="light" min="0" step="1" required />
    </div>
    <div class="field">
      <label for="rem">REM sleep (minutes)</label>
      <input type="number" id="rem" min="0" step="1" required />
    </div>
    <div class="field">
      <label for="awakenings">Number of awakenings</label>
      <input type="number" id="awakenings" min="0" step="1" required />
    </div>
    <button type="submit">Assess sleep</button>
  </form>

  <div class="card result" id="result">
    <div class="status" id="status"></div>
    <div class="breakdown" id="breakdown"></div>
    <div class="notes" id="notes"></div>
  </div>
</div>

<script>
  const form = document.getElementById("sleepForm");

  function pct(part, total) {
    return total > 0 ? (part / total) * 100 : 0;
  }

  function scoreSleep(deep, light, rem, awakenings) {
    const total = deep + light + rem;
    const totalHours = total / 60;
    const deepPct = pct(deep, total);
    const remPct = pct(rem, total);

    // Healthy reference ranges (adults):
    //  total ~7-9h, deep 13-23%, REM 20-25%, awakenings <= 2
    let issues = 0;
    const reasons = [];

    if (totalHours < 6) { issues += 2; reasons.push("Total sleep is well below 7 hours."); }
    else if (totalHours < 7) { issues += 1; reasons.push("Total sleep is slightly low."); }
    else if (totalHours > 10) { issues += 1; reasons.push("Total sleep is unusually long."); }

    if (deepPct < 10) { issues += 2; reasons.push("Deep sleep is too low (target 13-23%)."); }
    else if (deepPct < 13) { issues += 1; reasons.push("Deep sleep is below the healthy range."); }

    if (remPct < 15) { issues += 2; reasons.push("REM sleep is too low (target 20-25%)."); }
    else if (remPct < 20) { issues += 1; reasons.push("REM sleep is below the healthy range."); }

    if (awakenings >= 6) { issues += 2; reasons.push("Frequent awakenings disrupt sleep cycles."); }
    else if (awakenings >= 3) { issues += 1; reasons.push("More awakenings than ideal (aim for ≤ 2)."); }

    let level;
    if (issues === 0)      level = { key: "healthy",    label: "Healthy" };
    else if (issues <= 2)  level = { key: "moderate",   label: "Moderate" };
    else if (issues <= 4)  level = { key: "concerning", label: "Concerning" };
    else                   level = { key: "dangerous",  label: "Dangerous" };

    return { total, totalHours, deepPct, remPct, level, reasons };
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const deep = +document.getElementById("deep").value;
    const light = +document.getElementById("light").value;
    const rem = +document.getElementById("rem").value;
    const awakenings = +document.getElementById("awakenings").value;

    const r = scoreSleep(deep, light, rem, awakenings);

    const status = document.getElementById("status");
    status.textContent = r.level.label;
    status.className = "status " + r.level.key;

    const lightPct = pct(light, r.total);
    document.getElementById("breakdown").innerHTML = `
      <div class="row"><span>Total sleep</span><span>${r.totalHours.toFixed(1)} h</span></div>
      <div class="row"><span>Deep sleep</span><span>${deep} min (${r.deepPct.toFixed(0)}%)</span></div>
      <div class="row"><span>Light sleep</span><span>${light} min (${lightPct.toFixed(0)}%)</span></div>
      <div class="row"><span>REM sleep</span><span>${rem} min (${r.remPct.toFixed(0)}%)</span></div>
      <div class="row"><span>Awakenings</span><span>${awakenings}</span></div>
    `;

    const notes = document.getElementById("notes");
    if (r.reasons.length === 0) {
      notes.innerHTML = "All metrics are within healthy ranges. Keep it up!";
    } else {
      notes.innerHTML = "Notes:<ul>" + r.reasons.map(x => `<li>${x}</li>`).join("") + "</ul>";
    }

    document.getElementById("result").classList.add("show");
  });
</script>
</body>
</html>
